<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Terminal - Visualization</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍃</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root { --primary: #3b82f6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-y: auto; }
        .container { width: 100%; max-width: 1300px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 25px; }
        h1 { font-weight: 800; letter-spacing: -1px; color: #60a5fa; margin: 0; display: flex; align-items: center; gap: 10px; }
        h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #60a5fa; margin-top: 0; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .back-link { text-decoration: none; color: #94a3b8; font-weight: 600; font-size: 14px; transition: 0.3s; display: flex; align-items: center; gap: 6px; }
        .back-link:hover { color: var(--primary); }
        .graph-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; width: 100%; }
        .card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 10px 40px rgba(0,0,0,0.4); box-sizing: border-box; display: flex; flex-direction: column; min-height: 600px; }
        #orbit-container { flex: 1; width: 100%; background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); border-radius: 12px; position: relative; overflow: hidden; cursor: grab; }
        #orbit-container:active { cursor: grabbing; }
        .tooltip { position: absolute; padding: 12px; background: rgba(15, 23, 42, 0.95); border: 1px solid #3b82f6; border-radius: 12px; pointer-events: none; font-size: 12px; color: white; box-shadow: 0 5px 25px rgba(0,0,0,0.6); z-index: 1000; display: none; backdrop-filter: blur(4px); min-width: 140px; }
        .controls { margin-bottom: 15px; display: flex; gap: 15px; align-items: center; }
        select { flex: 1; padding: 10px; border-radius: 10px; background: #334155; color: white; border: none; font-weight: 600; font-size: 14px; outline: none; cursor: pointer; }
        canvas { max-width: 100%; }
        .node-link { stroke: #3b82f6; stroke-opacity: 0.2; stroke-dasharray: 4; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <h1><i data-lucide="line-chart"></i> VISUALIZATION</h1>
        <div style="display: flex; gap: 20px; align-items: center;">
            <a href="{{ url_for('stats') }}" class="back-link"><i data-lucide="bar-chart-3"></i> ANALYTICS</a>
            <a href="{{ url_for('admin') }}" class="back-link"><i data-lucide="settings"></i> SETTINGS</a>
            <a href="{{ url_for('index') }}" class="back-link"><i data-lucide="arrow-left"></i> RETURN TO TERMINAL</a>
        </div>
    </div>

    <div class="graph-grid">
        <div class="card">
            <div class="controls">
                <h2 style="margin:0; white-space: nowrap;"><i data-lucide="activity"></i> VIBE RADAR</h2>
                <select id="teaSelect">
                    <option value="">BROWSE INVENTORY...</option>
                    {% for category, items in teas|groupby('category') %}
                    <optgroup label="{{ category }}">
                        {% for tea in items %}
                        <option value="{{ tea.id }}">{{ tea.name }}</option>
                        {% endfor %}
                    </optgroup>
                    {% endfor %}
                </select>
            </div>
            <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
                <canvas id="radarChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="margin:0;"><i data-lucide="orbit"></i> FLAVOR ORBIT</h2>
                <span style="font-size: 10px; color: #64748b; font-weight: 800;">DRAG TO PAN • SCROLL TO ZOOM</span>
            </div>
            <div id="orbit-container">
                <div id="tooltip" class="tooltip"></div>
            </div>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();
    let teaData = [];
    let radarChart = null;

    async function init() {
        const res = await fetch('/api/tea_data');
        const rawData = await res.json();
        
        // Prepare data: save original projected coordinates as targets
        teaData = rawData.map(d => ({
            ...d,
            targetX: d.x,
            targetY: d.y,
            x: 0, // Start simulation at center
            y: 0
        }));
        
        const selector = document.getElementById('teaSelect');
        selector.addEventListener('change', (e) => {
            const tea = teaData.find(t => t.id == e.target.value);
            if (tea) updateRadar(tea);
        });

        initOrbit();
        
        if (teaData.length > 0) {
            selector.value = teaData[0].id;
            updateRadar(teaData[0]);
        }
    }

    function updateRadar(tea) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        if (radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Focus', 'Relaxation', 'Energy', 'Complexity'],
                datasets: [{
                    label: tea.name,
                    data: [tea.focus, tea.relaxation, tea.energy, tea.complexity],
                    backgroundColor: 'rgba(59, 130, 246, 0.2)',
                    borderColor: '#3b82f6',
                    pointBackgroundColor: '#3b82f6',
                    borderWidth: 3
                }]
            },
            options: {
                scales: {
                    r: {
                        beginAtZero: true,
                        max: 10,
                        ticks: { display: false, stepSize: 2 },
                        grid: { color: 'rgba(255, 255, 255, 0.1)' },
                        angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                        pointLabels: { color: '#94a3b8', font: { size: 12, weight: 'bold' } }
                    }
                },
                plugins: { legend: { labels: { color: '#f8fafc', font: { weight: 'bold' } } } }
            }
        });
    }

    function initOrbit() {
        const container = document.getElementById('orbit-container');
        const width = container.clientWidth;
        const height = container.clientHeight;
        const tooltip = document.getElementById('tooltip');

        const svg = d3.select("#orbit-container")
            .append("svg")
            .attr("width", "100%")
            .attr("height", "100%")
            .attr("viewBox", [0, 0, width, height]);

        const g = svg.append("g");

        // Zoom setup
        const zoom = d3.zoom()
            .scaleExtent([0.5, 5])
            .on("zoom", (event) => g.attr("transform", event.transform));
        svg.call(zoom);

        const colorScale = d3.scaleOrdinal(d3.schemeTableau10);
        
        // Force simulation for dynamic layout
        const simulation = d3.forceSimulation(teaData)
            .force("x", d3.forceX(d => (d.targetX + 1) * width / 2).strength(0.2))
            .force("y", d3.forceY(d => (d.targetY + 1) * height / 2).strength(0.2))
            .force("charge", d3.forceManyBody().strength(-100))
            .force("collide", d3.forceCollide().radius(d => 15 + Math.sqrt(d.brew_count) * 2));

        const linkLayer = g.append("g").attr("class", "links");

        const nodes = g.selectAll(".node")
            .data(teaData)
            .enter()
            .append("g")
            .attr("class", "node")
            .style("cursor", "pointer")
            .call(d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended));

        nodes.append("circle")
            .attr("r", d => 6 + Math.sqrt(d.brew_count) * 1.5)
            .attr("fill", d => colorScale(d.category))
            .attr("stroke", "#fff")
            .attr("stroke-width", 0.5)
            .style("filter", "drop-shadow(0 0 5px rgba(255,255,255,0.2))");

        nodes.on("mouseover", (event, d) => {
            // Highlight connections to nearest 3 neighbors
            const neighbors = teaData
                .map(target => ({ 
                    target, 
                    dist: Math.hypot(target.x - d.x, target.y - d.y) 
                }))
                .filter(n => n.target.id !== d.id)
                .sort((a, b) => a.dist - b.dist)
                .slice(0, 3);

            linkLayer.selectAll("line")
                .data(neighbors)
                .enter()
                .append("line")
                .attr("class", "node-link")
                .attr("x1", d.x_px)
                .attr("y1", d.y_px)
                .attr("x2", n => n.target.x_px)
                .attr("y2", n => n.target.y_px);

            d3.select(event.currentTarget).select("circle").transition().duration(200).attr("stroke-width", 3).attr("r", (6 + Math.sqrt(d.brew_count) * 1.5) * 1.3);
            
            tooltip.style.display = "block";
            tooltip.innerHTML = `
                <div style="font-weight:800; color:#60a5fa; border-bottom:1px solid #334155; margin-bottom:5px; padding-bottom:3px;">${d.name.toUpperCase()}</div>
                <div style="font-size:10px; color:#94a3b8; text-transform:uppercase;">${d.category}</div>
                <div style="margin-top:8px; display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                    <div><span style="color:#64748b">FOC</span> ${d.focus}</div>
                    <div><span style="color:#64748b">REL</span> ${d.relaxation}</div>
                    <div><span style="color:#64748b">ENE</span> ${d.energy}</div>
                    <div><span style="color:#64748b">COM</span> ${d.complexity}</div>
                </div>
            `;
            updateTooltipPos(event);
        })
        .on("mousemove", updateTooltipPos)
        .on("mouseout", (event, d) => {
            linkLayer.selectAll("line").remove();
            d3.select(event.currentTarget).select("circle").transition().duration(200).attr("stroke-width", 0.5).attr("r", 6 + Math.sqrt(d.brew_count) * 1.5);
            tooltip.style.display = "none";
        })
        .on("click", (event, d) => {
            const selector = document.getElementById('teaSelect');
            selector.value = d.id;
            selector.dispatchEvent(new Event('change'));
        });

        simulation.on("tick", () => {
            nodes.attr("transform", d => {
                d.x_px = d.x;
                d.y_px = d.y;
                return `translate(${d.x},${d.y})`;
            });
        });

        function updateTooltipPos(event) {
            tooltip.style.left = (event.pageX - container.getBoundingClientRect().left + 15) + "px";
            tooltip.style.top = (event.pageY - container.getBoundingClientRect().top - 15) + "px";
        }

        function dragstarted(event) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }
        function dragged(event) {
            event.subject.fx = event.x;
            event.subject.fy = event.y;
        }
        function dragended(event) {
            if (!event.active) simulation.alphaTarget(0);
            event.subject.fx = null;
            event.subject.fy = null;
        }
    }

    init();
</script>
</body>
</html>
