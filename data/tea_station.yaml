      \ Infusions: Dried apple slices or a vanilla bean. Apple slices give it a \"\
      spiced cider\" undertone, while a vanilla bean (or a drop of extract) rounds\
      \ out the spices with a smooth, dessert-like finish.\r\n\r\nMilk & Creams: Warm\
      \ oat milk or frothed half-and-half. Oat milk has a natural graininess that\
