      tang\" of goat cheese is a classic partner for dark fruits, and the saltiness\
      \ of the olives provides a sharp contrast to the tea's mystical aromatics.\r\
      \n\r\nNotes: This is a transformation-themed blend. If the \"Call\" feels a\
      \ bit too wild or acidic, a single star anise pod added to the steep can help\
      \ ground the flavors with a sweet, licorice-like warmth that feels both ancient\
      \ and comforting."
    restart: unless-stopped
  enchanted_oasis:
    container_name: enchanted_oasis
    category: White Tea
    environment:
    - 'RATIO=1.5 tsp : 8oz'
    - TEMP=200°F
    - TIME=240
    - BREW_COUNT=0
    image: tea_station/white_tea:latest
    notes: A bright, tropical Piña Colada white tea blend that captures the essence
      of a tranquil jungle hideaway with notes of sun-kissed pineapple and creamy
      coconut.
    volumes:
    - "additive:/Sweeteners: Orange blossom honey or agave nectar Fig Leaf syrup.\
      \ Orange blossom honey enhances the floral, \"mirage-like\" aromatics of the\
      \ oasis, while agave provides a clean, thin sweetness that keeps the profile\
      \ refreshing and light.\r\n\r\nFruit & Herb Infusions: Fresh mint leaves or\
      \ dried hibiscus. Mint is the classic \"oasis\" staple, providing a cooling\
      \ sensation that cuts through the desert heat. Hibiscus adds a tart, cranberry-like\
      \ \"zing\" and a deep ruby color that looks magical in the cup.\r\n\r\nMilk\
      \ & Creams: Splash of light coconut milk. Because \"Enchanted Oasis\" blends\
      \ are often lighter (green or herbal based), heavy dairy can be overwhelming.\
      \ Coconut milk adds a tropical, velvety finish that mimics the lushness of a\
      \ hidden spring."
    - "snack:/Sweet: Baklava or date cookies (Ma'amoul). The honey and nuts in baklava\
      \ provide a rich, crunchy contrast to the tea’s floral notes, while the dense,\
      \ sweet filling of dates is a traditional desert pairing that grounds the \"\
      Enchanted\" theme.\r\n\r\nSavory: Salted pistachios or pita with hummus. Pistachios\
      \ offer an earthy, buttery crunch that pairs beautifully with floral teas. The\
      \ savory, garlic-led notes of hummus provide a robust anchor to the delicate\
      \ tea aromatics.\r\n\r\nNotes: If the floral notes feel a bit too \"perfumey,\"\
      \ a squeeze of fresh lime can provide the necessary acidity to balance the brew.\
      \ Since you're likely wrapping up your Gender Studies quiz or prep for your\
      \ CS 330 lab around this time of night, the refreshing nature of this tea is\
      \ perfect for keeping your mind clear without a heavy caffeine crash."
    restart: unless-stopped
  lemon_black_tea:
    container_name: lemon_black_tea
    category: Black Tea
    environment:
    - 'RATIO=1.5 tsp : 8oz'
    - TEMP=200°F
    - TIME=240
    - BREW_COUNT=0
    image: tea_station/black_tea:latest
    notes: A bright and refreshing blend that combines the deep, malty notes of black
      tea with the zesty, uplifting flavor of natural lemon. It's a versatile choice
      that works equally well as a morning "pick-me-up" or a crisp iced tea in the
      afternoon.
    volumes:
    - "additive:/Sweeteners: Wildflower honey or white sugar or Sour Cherry syrup.\
      \ Honey adds a floral, soothing layer that turns the drink into a \"liquid lozenge\"\
      \ (great for long study sessions), while white sugar provides a \"clean\" sweetness\
      \ that lets the lemon tartness take center stage.\r\n\r\nFruit & Herb Infusions:\
      \ Fresh ginger slices or mint leaves. Ginger adds a spicy \"zing\" that complements\
      \ the lemon's acidity, while mint provides a cooling finish that makes this\
      \ tea incredibly refreshing, whether hot or iced.\r\n\r\nMilk & Creams: Generally\
      \ avoided. The citric acid in the lemon can cause dairy to curdle. If you absolutely\
      \ want a creamy texture, try a splash of coconut milk, which is more stable\
      \ and creates a \"lemon-cream\" profile."
    - "snack:/Sweet: Blueberry muffins or lemon poppyseed cake. The berries provide\
      \ a sweet, dark contrast to the bright tea, while the poppyseed cake doubles\
      \ down on the citrus theme for a very cohesive pairing.\r\n\r\nSavory: Roasted\
      \ almonds with sea salt or a turkey club sandwich. The acidity of the lemon\
      \ tea acts as a palate cleanser for salty, savory snacks, cutting through the\
      \ richness of the nuts or the fats in the sandwich"
    restart: unless-stopped
  cozy_chai:
