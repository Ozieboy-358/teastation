version: '3.8'
services:
  divine_intervention:
    container_name: divine_intervention
    category: White Tea
    environment:
    - 'RATIO=1.5 tsp : 8oz'
    - TEMP=175°F
    - TIME=240
    - BREW_COUNT=0
    image: tea_station/white_tea:latest
    notes: White tea base, Light, Sweet, eathy dried fig, honey-like
    volumes:
    - "additive:/Sweeteners: White rock sugar or light wildflower honey or Lavender\
      \ Sumac syrup. You want a \"pure\" sweetness that doesn't cloud the brew. Rock\
      \ sugar provides a clean lift, while wildflower honey echoes the floral high\
      \ notes without adding a heavy \"earthy\" aftertaste.\r\n\r\nFruit & Herb Infusions:\
      \ Dried elderberries or fresh lemon zest. Elderberries add a mystical, dark-fruit\
      \ tartness, while lemon zest provides a \"halo\" of bright citrus aroma that\
      \ cleanses the palate.\r\n\r\nMilk & Creams: A cloud of frothed almond milk.\
      \ Almond milk is light enough to let the tea's complexity shine through while\
      \ providing a silky, \"angelic\" texture to the cup."
    - "snack:/Sweet: Angel food cake or lavender shortbread. The light-as-air texture\
      \ of the cake is the thematic perfect match, and lavender shortbread reinforces\
      \ the floral aromatics of the tea.\r\n\r\nSavory: Whipped feta with honey or\
      \ lightly salted cashews. The creamy, salty tang of the feta provides a sophisticated\
      \ contrast to the tea's sweetness, while cashews offer a buttery, neutral crunch."
    restart: unless-stopped
  holy_moly_hermes:
    container_name: holy_moly_hermes
    category: Black Tea
    environment:
    - 'RATIO=1.5 tsp : 8oz'
    - TEMP=200°F
    - TIME=240
    - BREW_COUNT=1
    image: tea_station/black_tea:latest
    notes: A magical and "fabulous" tea blend that features a base of Huckleberry
      Vanilla Earl Grey, brightened with spicy cardamom and zesty orange peel. It
      even includes edible "luster dust" to give the brew a shimmering, celestial
      glow.
    volumes:
    - "additive:/Sweeteners: Cajeta (Mexican caramel) or dark brown sugar. Cajeta's\
      \ goat-milk base and deep caramelization match the \"Moly\" theme, while dark\
      \ brown sugar mirrors the molasses notes of the tea's darker elements.\r\n\r\
      \nFruit Infusions: Dried ancho chili slices or fresh orange peel. A tiny sliver\
      \ of dried chili can enhance the \"Holy Moly\" kick, while orange zest adds\
      \ a bright, citric contrast that cuts through the heavy cocoa and spice notes.\r\
      \n\r\nMilk & Creams: Frothed chocolate soy milk or heavy cream. Chocolate soy\
      \ milk doubles down on the \"cocoa\" profile, while heavy cream turns the brew\
      \ into a decadent, liquid-dessert experience."
    - "snack:/Sweet: Churros with cinnamon sugar or Mexican chocolate disks. The fried\
      \ dough and cinnamon of the churros are a classic pairing for Mexican-inspired\
      \ flavors, and the gritty texture of Mexican chocolate adds a rustic, sweet\
      \ crunch.\r\n\r\nSavory: Plantain chips with a dash of cayenne or spiced pumpkin\
      \ seeds (pepitas). The starchiness of the plantains and the earthy, roasted\
      \ flavor of the pepitas balance the bold \"Moly\" spices.\r\n\r\nNotes: This\
      \ is a robust, flavor-packed blend. If the spice becomes a bit too \"holy\"\
      \ (intense), a pinch of sea salt in the cup can actually help suppress the bitterness\
      \ of the cocoa and make the spice profile feel more rounded and sweet."
    restart: unless-stopped
  the_gilded_teafling:
    container_name: the_gilded_teafling
    category: Chai Tea
    environment:
    - 'RATIO=1.5 tsp : 8oz'
    - TEMP=200°F
    - TIME=240
    - BREW_COUNT=0
    image: tea_station/chai_tea:latest
    notes: A luxurious and flagship Caramel Chai that serves as the "heart" of the
      brand’s collection. It is a warm, full-bodied blend featuring a rich black tea
      base layered with creamy caramel and traditional aromatic spices.
    volumes:
    - "additive:/Sweeteners: Wildflower honey or amber rock sugar. Wildflower honey\
      \ pulls out the hidden floral notes in the signature blend, while amber rock\
      \ sugar adds a mellow, caramelized sweetness that doesn't mask the tea's complexity.\r\
      \n\r\nFruit & Herb Infusions: Dried goldenberries or a sprig of fresh thyme.\
      \ Goldenberries add a tart, \"jewel-like\" snap that matches the \"Gilded\"\
      \ theme, while thyme adds a subtle, savory earthiness that grounds the more\
      \ delicate aromatics.\r\n\r\nMilk & Creams: Splash of frothed cashew milk. Cashew\
      \ milk is naturally creamy and slightly sweet, providing a luxurious mouthfeel\
      \ that complements the \"signature\" richness without the heaviness of dairy."
    - "snack:/Sweet: Gold-dusted dark chocolate truffles or apricot galette. The bitterness\
      \ of dark chocolate provides a sophisticated base for the tea's high notes,\
      \ while the tart apricot filling in a galette mirrors the tea's bright finish.\r\
      \n\r\nSavory: Roasted almonds with rosemary or brie on a toasted baguette. The\
      \ woodsy aroma of rosemary and the creamy, \"melt-in-your-mouth\" texture of\
      \ brie provide a high-end pairing for this flagship blend."
    restart: unless-stopped
  black_cask_bourbon:
    container_name: black_cask_bourbon
    category: Black Tea
    environment:
    - 'RATIO=1 tsp : 8oz'
    - TEMP=212°F
    - TIME=240
    - BREW_COUNT=0
    image: tea_station/black_tea:latest
    notes: A bold and intense "gentleman’s" tea that mimics the experience of a finely
      aged bourbon. It layers the deep, smoky aroma of black tea with rich, sweet
      notes of vanilla, caramel, and charred oak.
    volumes:
    - "additive:/Sweeteners: Maple syrup or brown sugar cubes. Maple syrup is the\
      \ perfect partner for bourbon notes, adding a woody sweetness. Brown sugar emphasizes\
      \ the \"charred\" caramel profile of the tea.\r\n\r\nFruit & Herb Infusions:\
      \ Dried orange peel or a single luxardo cherry. An orange peel mimics an \"\
      Old Fashioned\" cocktail, providing a bright citrus oil that cuts through the\
      \ smoky depth.\r\n\r\nMilk & Creams: A splash of heavy cream or frothed oat\
      \ milk. This tea is \"big\" enough to handle heavy dairy. Cream smooths out\
      \ the \"tannic bite\" of the black tea, making it taste like a rich, non-alcoholic\
      \ bourbon cream."
    - "snack:/Sweet: Dark chocolate with sea salt or pecan pie. The bitterness of\
      \ the chocolate and the salt highlight the oaky notes, while the \"nutty\" sweetness\
      \ of a pecan pie matches the bourbon profile perfectly.\r\n\r\nSavory: Smoked\
      \ gouda or beef jerky. Smoked cheese is a phenomenal pairing for this tea, reinforcing\
      \ the \"Cask\" element. The savory, salty jerky provides a rugged contrast to\
      \ the vanilla-bourbon finish."
    restart: unless-stopped
  morning_sleepyhead_calypso:
    container_name: morning_sleepyhead_calypso
    category: Pu-erh Tea
    environment:
    - 'RATIO=1.5 tsp : 8oz'
    - TEMP=175°F
    - TIME=120
    - BREW_COUNT=1
    image: tea_station/pu-erh_tea:latest
    notes: A "cup of paradise" featuring a rare Kenyan purple tea base, sweetened
      with notes of brown sugar and brightened with passionfruit and juicy papaya.
    volumes:
    - "additive:/Sweeteners: Passion fruit syrup or guava nectar. To lean into the\
      \ \"Calypso\" tropical theme, these provide a vibrant, \"sunny\" sweetness that\
      \ helps shake off the morning grogginess better than plain sugar.\r\n\r\nFruit\
      \ Infusions: Fresh mango slices or mint leaves. Mango adds a luscious, tropical\
      \ body to the tea, while mint provides a refreshing \"cold\" sensation that\
      \ helps wake up your senses and clear the cobwebs.\r\n\r\nMilk & Creams: Coconut\
      \ milk or splash of pineapple juice. Coconut milk keeps the tropical vibe going\
      \ with a creamy finish, while a splash of pineapple juice (if the tea is a fruit/herbal\
      \ base) adds a tart \"zing\" to jumpstart your metabolism."
    - "snack:/Sweet: Dried pineapple rings or coconut macaroons. These snacks echo\
      \ the island-inspired profile of the tea, providing a chewy, sugary energy boost\
      \ to start your day.\r\n\r\nSavory: Macadamia nuts or prosciutto-wrapped melon.\
      \ The rich fats in the nuts provide long-lasting fuel for your morning, while\
      \ the saltiness of the prosciutto cuts through the tea's sweet tropical notes.\r\
      \n\r\nNotes: If you're feeling particularly \"sleepyheaded\" before your CS\
      \ 330 lab or a morning workout at Planet Fitness, try adding a squeeze of fresh\
      \ lime. The citric acid provides a sharp \"reset\" for your palate and can make\
      \ the tea's aromatics feel much more energizing."
    restart: unless-stopped
  quick-thought_athena:
    container_name: quick-thought_athena
    category: Black Tea
    environment:
    - 'RATIO=1.5 tsp : 8oz'
    - TEMP=200°F
    - TIME=240
    - BREW_COUNT=1
    image: tea_station/black_tea:latest
    notes: A sharp and strategic black tea blend featuring bold Assam and complex
      Oolong, softened by notes of sweet marshmallow and warming brandy, and finished
      with a "spark of inspiration" from spicy cinnamon.
    volumes:
    - "additive:/Sweeteners: Lemon-infused honey or light agave nectar. A clean, citrusy\
      \ sweetness helps keep your palate \"sharp\" and refreshed, avoiding the mid-study\
      \ sugar crash that comes with heavier syrups.\r\n\r\nFruit & Herb Infusions:\
      \ Fresh rosemary sprigs or lemon zest. Rosemary is traditionally associated\
      \ with \"remembrance\" and wisdom (perfect for the Athena theme), while lemon\
      \ provides a bright, acidic lift that wakes up the senses.\r\n\r\nMilk & Creams:\
      \ A splash of unsweetened almond milk. Since this is likely a brighter, mental-clarity\
      \ blend, heavy dairy might feel too \"slow.\" Almond milk provides a light,\
      \ nutty finish that complements the herbal notes without weighing you down."
    - "snack:/Sweet: Dark chocolate (70%+) or lemon poppyseed muffins. Dark chocolate\
      \ is excellent \"brain food\" for focus, while the tartness of a lemon muffin\
      \ echoes the bright, intellectual profile of the tea.\r\n\r\nSavory: Walnuts\
      \ or salted edamame. Walnuts are famously shaped like brains and rich in Omega-3s,\
      \ making them a thematic and functional pairing for a \"Quick-Thought\" brew.\r\
      \n\r\nNotes: This is the ideal blend for when you’re deep in the \"logic zone.\"\
      \ Whether you’re debugging code for CS 330 or analyzing complex social structures\
      \ for your Gender Studies quiz, the \"Athena\" energy is meant to keep your\
      \ cognitive gears turning. If you find your mind wandering, try adding a pinch\
      \ of sea salt; it helps ground the flavors and can provide a tiny electrolyte\
      \ boost during long sessions."
    restart: unless-stopped
  travelers_hearth:
    container_name: travelers_hearth
    category: Rooibos Tea
    environment:
    - 'RATIO=1.5 tsp : 8oz'
    - TEMP=212°F
    - TIME=300
    - BREW_COUNT=0
    image: tea_station/rooibos_tea:latest
    notes: A cozy, "homestyle" herbal blend designed to evoke the feeling of a warm
      fireplace at the end of a long journey. It features a naturally sweet Red Rooibos
      base layered with cinnamon, clove, and orange peel.
    volumes:
    - "additive:/Sweeteners: Honey or maple syrup or Elderberry syrup. Honey brings\
      \ out the floral side of the spices, while maple syrup emphasizes the \"woodsy\"\
      \ and \"toasted\" qualities of the blend.\r\n\r\nFruit & Herb Infusions: Dried\
      \ apple slices or a whole cinnamon stick. Apple slices add a \"cider\" sweetness,\
      \ while the cinnamon stick provides a steady, warming heat that gets better\
      \ the longer it sits in your mug.\r\n\r\nMilk & Creams: Splash of oat milk or\
      \ heavy cream. This creates a \"latte\" mouthfeel that carries the heavier spices\
      \ (like clove or nutmeg) across your palate more smoothly."
    - "snack:/Sweet: Apple turnovers or gingerbread. These treats echo the \"warm\
      \ kitchen\" aromatics of the tea and provide a buttery base that balances the\
      \ spice.\r\n\r\nSavory: Sharp white cheddar or smoked almonds. The acidity of\
      \ the cheese cuts through the tea’s sweetness, and the smokiness of the almonds\
      \ reinforces the \"hearth\" theme perfectly."
    restart: unless-stopped
  chai_love:
    container_name: chai_love
    category: Chai Tea
    environment:
    - 'RATIO=1.5 tsp : 8oz'
    - TEMP=212°F
    - TIME=240
    - BREW_COUNT=0
    image: tea_station/chai_tea:latest
    notes: A bold, high-caffeine spiced black tea blend that combines classic aromatic
      spices with a "jolt" of energy. It’s designed to be a warming, flavorful alternative
      to coffee, featuring large pieces of real spices you can see.
    volumes:
    - "additive:/Sweeteners: Dark honey or sweetened condensed milk or Elderberry\
      \ syrup. Dark honey highlights the floral spices, while condensed milk creates\
      \ a \"street-chai\" style richness that makes the tea feel like a meal in itself.\r\
      \n\r\nFruit & Herb Infusions: Fresh ginger or a star anise pod. Adding more\
      \ fresh ginger increases the \"burn\" (the good kind!), while star anise provides\
      \ a beautiful visual and a sweet, licorice-like aroma.\r\n\r\nMilk & Creams:\
      \ Whole milk or extra-creamy oat milk. Chai is built for milk; the fats carry\
      \ the spice oils across your tongue, turning the \"bite\" into a smooth, warming\
      \ glow."
    - "snack:/Sweet: Snickerdoodles or banana bread. The cinnamon-sugar on the cookies\
      \ mirrors the tea's profile, while the density of banana bread provides a comforting,\
      \ starchy base for the bold spices.\r\n\r\nSavory: Spiced pecans or samosas.\
      \ The buttery crunch of pecans or the savory, vegetable-filled pastry of a samosa\
      \ provides a perfect earthy counterpoint to the tea's sweet heat."
    restart: unless-stopped
  royal_breakfast:
    container_name: royal_breakfast
    category: Black Tea
    environment:
    - 'RATIO=1.5 tsp : 8oz'
    - TEMP=212°F
    - TIME=240
    - BREW_COUNT=1
    image: tea_station/black_tea:latest
    notes: It is a quintessential English-style black tea blend that is bold, malty,
      and high in caffeine.
    volumes:
    - "additive:/Sweeteners: Turbinado sugar or Manuka honey. The slight molasses\
      \ notes of raw sugar enhance the tea's natural maltiness, while Manuka honey\
      \ adds a rich, velvety sweetness that feels appropriately \"royal.\"\r\n\r\n\
      Fruit & Herb Infusions: Lemon zest or dried currants. A quick twist of lemon\
      \ zest provides a bright \"crown\" of aroma that cuts through the tannins, while\
      \ currants add a subtle, dark-fruit depth.\r\n\r\nMilk & Creams: Heavy cream\
      \ or frothed whole milk. This blend is designed to be \"stout.\" A splash of\
      \ heavy cream creates a luxurious, silk-like texture that smooths out the brisk\
      \ finish."
    - "snack:/Sweet: Shortbread fingers or sultana scones. The high butter content\
      \ in shortbread is the classic foil for a strong black tea, helping to balance\
      \ the astringency on the palate.\r\n\r\nSavory: Smoked salmon on rye or a sharp\
      \ English cheddar. The tea's robust body stands up beautifully to salty, smoky\
      \ flavors, making it a great partner for a savory brunch.Sweet: Shortbread fingers\
      \ or sultana scones. The high butter content in shortbread is the classic foil\
      \ for a strong black tea, helping to balance the astringency on the palate.\r\
      \n\r\nSavory: Smoked salmon on rye or a sharp English cheddar. The tea's robust\
      \ body stands up beautifully to salty, smoky flavors, making it a great partner\
      \ for a savory brunch."
    restart: unless-stopped
  victorian_earl_grey:
    container_name: victorian_earl_grey
    category: Black Tea
    environment:
    - 'RATIO=1.5 tsp : 8oz'
    - TEMP=212°F
    - TIME=240
    - BREW_COUNT=0
    image: tea_station/black_tea:latest
    notes: A sophisticated and floral twist on the classic Earl Grey, typically blending
      robust black tea with lavender, rose petals, and cornflowers alongside the signature
      citrus of bergamot.
    volumes:
    - "additive:/Sweeteners: Clover honey or rose simple syrup or Lavender Sumac syrup.\
      \ Clover honey has a light, floral sweetness that doesn't compete with the bergamot,\
      \ while rose syrup leans into the \"Victorian Garden\" aesthetic of the tea.\r\
      \n\r\nFruit & Herb Infusions: Dried rose petals or lemon slices. Adding extra\
      \ petals makes the cup look stunning and enhances the aroma, while lemon provides\
      \ a sharp citrus lift that cuts through the floral weight.\r\n\r\nMilk & Creams:\
      \ A splash of whole milk or frothed soy milk. A traditional Victorian preparation\
      \ often includes a tiny bit of milk to soften the tannins of the black tea base,\
      \ creating a smooth, \"antique\" copper-colored brew."
    - "snack:/Sweet: Lavender scones with clotted cream or petit fours. These quintessential\
      \ high-tea snacks match the elegance of the blend and provide a buttery base\
      \ for the floral aromatics.\r\n\r\nSavory: Cucumber and mint finger sandwiches\
      \ or smoked salmon on a cracker. The coolness of the cucumber or the richness\
      \ of the salmon provides a sophisticated contrast to the bold bergamot."
    restart: unless-stopped
  english_breakfast:
    container_name: english_breakfast
    category: Black Tea
    environment:
    - 'RATIO=1 tsp : 8oz'
    - TEMP=212°F
    - TIME=240
    - BREW_COUNT=0
    image: tea_station/black_tea:latest
    notes: Full-bodied, rich, smooth robust, full-bodied black tea known for its rich,
      malty flavor and deep coppery color. It is typically a blend of Assam, Ceylon,
      and Kenyan teas, designed to be strong enough to stand up to a splash of milk
      and sugar.
    volumes:
    - "additive:/Sweeteners: Turbinado sugar or clover honey. The slight molasses\
      \ notes of raw sugar complement the malty depth of the black tea, while clover\
      \ honey adds a mild, floral sweetness that doesn't mask the tea's natural robustness.\r\
      \n\r\nFruit Infusions: Lemon slices or dried currants. A classic squeeze of\
      \ lemon adds a sharp acidity that cuts through the tannins, while currants provide\
      \ a subtle, dark-fruit sweetness that leans into the traditional \"English\"\
      \ vibe.\r\n\r\nMilk & Creams: Splash of whole milk or heavy cream. This is the\
      \ gold standard for English Breakfast. The milk fats bind to the tannins, smoothing\
      \ out the astringency and creating a rich, copper-colored brew with a velvety\
      \ mouthfeel."
    - "snack:/Sweet: Scones with clotted cream or shortbread. The buttery, crumbly\
      \ texture of these treats is designed to absorb the tea and balance its bold,\
      \ \"wake-up\" strength.\r\n\r\nSavory: A full breakfast (eggs and bacon) or\
      \ smoked salmon on toast. Since this is a high-tannin tea, it pairs exceptionally\
      \ well with protein and fat—the savory notes help temper the tea's briskness.\r\
      \n\r\nNotes: If you're drinking this before heading to Planet Fitness or a long\
      \ study session for your CS courses, try adding a pinch of cinnamon. It provides\
      \ a natural \"sweet\" perception without the sugar crash, keeping you fueled\
      \ and focused."
    restart: unless-stopped
  earl_grey_de_la_crème:
    container_name: earl_grey_de_la_crème
    category: Black Tea
    environment:
    - 'RATIO=1.5 tsp : 8oz'
    - TEMP=212°F
    - TIME=240
    - BREW_COUNT=0
    image: tea_station/black_tea:latest
    notes: A smooth, velvety twist on the traditional Earl Grey, featuring a robust
      black tea base mellowed by creamy vanilla and fragrant blue cornflowers. It’s
      designed to be richer and less sharp than a standard Earl Grey, making it perfect
      for a "London Fog" latte.
    volumes:
    - "additive:/Sweeteners: Vanilla-infused honey or white sugar. Vanilla honey doubles\
      \ down on the \"Crème\" profile, while plain white sugar provides a neutral\
      \ sweetness that lets the floral bergamot shine without adding competing flavors.\r\
      \n\r\nFruit & Herb Infusions: Dried lavender buds or fresh orange zest. Lavender\
      \ turns this into a \"London Fog\" style brew with an extra floral layer, while\
      \ orange zest amplifies the citrus notes of the bergamot.\r\n\r\nMilk & Creams:\
      \ Frothed whole milk or vanilla oat milk. This tea is practically made for milk.\
      \ Frothed milk creates that signature \"London Fog\" texture, while vanilla\
      \ oat milk enhances the creamy, \"cookie-like\" finish."
    - "snack:/Sweet: Lemon shortbread or vanilla macarons. The citrus in the shortbread\
      \ cuts through the creamy tea, while macarons match the \"fancy\" and delicate\
      \ nature of this specific blend.\r\n\r\nSavory: Cucumber sandwiches with cream\
      \ cheese or mild white cheddar. These light, refreshing snacks provide a clean\
      \ palate between sips of the rich, aromatic tea.\r\n\r\nNotes: If the bergamot\
      \ feels a bit too \"perfumey\" or soapy for your taste, a pinch of salt in the\
      \ cup can actually help suppress those high floral notes and make the vanilla-cream\
      \ base taste much more prominent."
    restart: unless-stopped
  irish_breakfast:
    container_name: irish_breakfast
    category: Black Tea
    environment:
    - 'RATIO=1 tsp : 8oz'
    - TEMP=212°F
    - TIME=240
    - BREW_COUNT=0
    image: tea_station/black_tea:latest
    notes: A thick, malty profile with a robust, earthy backbone and deep molasses
      undertones that leave a sharp, briskly astringent finish.
    volumes:
    - "additive:/Sweeteners: Brown sugar(DARK) or Whiskey extract(DROP). The molasses\
      \ undertones in the sugar enhance the tea's naturally malty profile, while the\
      \ extract provides an authentic, \"stewy\" Irish soul.\r\n\r\nFruit & Herb Infusions:\
      \ Elderberry Syrup(STIRRED). This adds a deep, dark berry base that grounds\
      \ the robust black tea leaves and adds a layer of \"purple\" fruit complexity.\r\
      \n\r\nMilk & Creams: Heavy cream(FROTHED). Irish Breakfast is specifically blended\
      \ to stand up to heavy dairy; frothing the cream creates a velvety body that\
      \ smooths out the strong tannic bite."
    - "snack:/Irish Soda Bread: The classic pairing; the density of the bread matches\
      \ the density of the tea.\r\n\r\nWarm Oats: A hearty bowl of oatmeal with a\
      \ bit of brown sugar.\r\n\r\nFruit Jam: Specifically blackcurrant or plum to\
      \ play off the Elderberry syrup.\r\n\r\nSavory Sausage: The fats in the sausage\
      \ are cut perfectly by the tea's astringency.\r\n\r\nSharp Irish Cheddar: A\
      \ bold cheese that won't get lost next to such a strong brew."
    restart: unless-stopped
  lean_green_machine:
    container_name: lean_green_machine
    category: Green Tea
    environment:
    - 'RATIO=1 tsp : 8oz'
    - TEMP=175°F
    - TIME=120
    - BREW_COUNT=0
    image: tea_station/green_tea:latest
    notes: A crisp and energizing green tea with bright notes of lemon, lemongrass,
      and a subtle, aromatic hint of bergamot oil.
    volumes:
    - "additive:/Sweeteners: Stevia or Monk fruit drops. To stay consistent with the\
      \ \"lean\" profile, these zero-calorie options provide a clean sweetness without\
      \ a sugar spike.\r\n\r\nFruit Infusions: Cucumber slices or fresh mint. These\
      \ emphasize the crisp, refreshing \"green\" notes of the tea and add a cooling,\
      \ hydrating finish.\r\n\r\nMilk & Creams: Unsweetened almond milk. It has a\
      \ light, nutty body that doesn't weigh down the delicate green tea base or mask\
      \ the vegetal flavors."
    - "snack:/Sweet: Matcha-dusted almonds or green apple slices. The tartness of\
      \ the apple or the earthy sweetness of the matcha-coated nuts complements the\
      \ grassy profile of the blend perfectly.\r\n\r\nSavory: Roasted seaweed snacks\
      \ or edamame with sea salt. These provide a light, umami-rich crunch that balances\
      \ the natural astringency of the green tea.\r\n\r\nNotes: This tea is often\
      \ intended for a clean energy boost. Pairing it with protein-rich snacks like\
      \ the almonds or edamame helps sustain that energy without a heavy \"food coma\"\
      \ feeling."
    restart: unless-stopped
  peaches_n_green:
    container_name: peaches_n_green
    category: Green Tea
    environment:
    - 'RATIO=1 tsp : 8oz'
    - TEMP=175°F
    - TIME=120
    - BREW_COUNT=0
    image: tea_station/green_tea:latest
    notes: A grassy, delicate green tea base brightened by sun-ripened peach sweetness
      and a creamy, nutty finish.
    volumes:
    - 'additive:/Sweeteners: Fig Leaf Syrup or Agave(LIGHT). The fig leaf syrup provides
      a creamy, "green" sweetness that anchors the bright peach notes.


      Fruit & Herb Infusions: Peach juice(SPLASH) or Honey(PURE). Adding a splash
      of juice intensifies the stone fruit profile without adding artificial weight.


      Milk & Creams: Almond milk(CHILLED). The nuttiness of almond milk pairs naturally
      with the "green" depth of the fig leaf and tea base.


      Texture: Peach slices(FRESH) or Mint(FRESH SPRIG). Fresh fruit adds a juicy
      texture to the delicate green tea.'
    - 'snack:/Sweet: Vanilla yogurt, Fresh peaches, or Vanilla wafers.


      Savory: Plain granola or Roasted cashews.'
    restart: unless-stopped
  chinese_jasmine:
    container_name: chinese_jasmine
    category: Green Tea
    environment:
    - 'RATIO=1.5 tsp : 8oz'
    - TEMP=175°F
    - TIME=120
    - BREW_COUNT=1
    image: tea_station/green_tea:latest
    notes: Jasmine, Floral, Delicate, Green Tea
    volumes:
    - "additive:/Sweeteners: Use rock sugar (Bing Tang) or a light clover honey. These\
